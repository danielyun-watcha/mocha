<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220" aria-label="Mocha mascot">
  <!-- Steam (3 wisps with twin loops, like data-flow icon) -->
  <g stroke="#d97757" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M70 38 Q 70 24, 84 24 Q 98 24, 98 38 Q 98 52, 84 52 Q 70 52, 70 38 Z" fill="#fff"/>
    <path d="M100 30 Q 100 16, 114 16 Q 128 16, 128 30 Q 128 44, 114 44 Q 100 44, 100 30 Z" fill="#fff"/>
    <path d="M130 50 Q 130 36, 144 36 Q 158 36, 158 50 Q 158 64, 144 64 Q 130 64, 130 50 Z" fill="#fff"/>
    <path d="M84 52 Q 90 58, 100 58 Q 110 58, 114 44"/>
    <path d="M128 30 Q 132 38, 138 42 Q 144 46, 144 36"/>
  </g>

  <!-- Head circle (white) -->
  <circle cx="100" cy="115" r="55" fill="#ffffff" stroke="#2a2f3a" stroke-width="3"/>

  <!-- Headphone band -->
  <path d="M52 105 Q 100 70, 148 105" stroke="#2a2f3a" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Headphone left cup -->
  <ellipse cx="48" cy="118" rx="11" ry="16" fill="#d97757" stroke="#2a2f3a" stroke-width="3"/>
  <!-- Headphone right cup -->
  <ellipse cx="152" cy="118" rx="11" ry="16" fill="#d97757" stroke="#2a2f3a" stroke-width="3"/>

  <!-- Cheeks (pink blush) -->
  <ellipse cx="74" cy="135" rx="9" ry="6" fill="#ffbfb0" opacity="0.85"/>
  <ellipse cx="126" cy="135" rx="9" ry="6" fill="#ffbfb0" opacity="0.85"/>

  <!-- Eyes (big shiny) -->
  <circle cx="84" cy="118" r="9" fill="#1a1f29"/>
  <circle cx="116" cy="118" r="9" fill="#1a1f29"/>
  <circle cx="87" cy="115" r="3" fill="#ffffff"/>
  <circle cx="119" cy="115" r="3" fill="#ffffff"/>

  <!-- Mouth (open smile w/ tongue) -->
  <path d="M88 138 Q 100 152, 112 138 Z" fill="#1a1f29"/>
  <ellipse cx="100" cy="146" rx="6" ry="3" fill="#ff8a7a"/>

  <!-- Body (small tee) -->
  <path d="M62 168 Q 62 195, 90 200 L 110 200 Q 138 195, 138 168 Z" fill="#ffffff" stroke="#2a2f3a" stroke-width="3"/>
  <!-- Tee letters -->
  <text x="100" y="190" text-anchor="middle" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="14" font-weight="700" fill="#d97757">mocha</text>

  <!-- Waving hand -->
  <circle cx="148" cy="172" r="9" fill="#ffffff" stroke="#2a2f3a" stroke-width="3"/>
</svg>
