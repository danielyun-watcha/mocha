<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOCHA — 데이터 분석 AI</title>
  <meta name="description" content="자연어로 묻는 Watcha 데이터 분석 AI">
  <meta name="adp-app-name" content="mocha">
  <meta name="adp-owner" content="daniel">

  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css">
  <link rel="stylesheet" href="/static/style.css">

  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/highlight.min.js"></script>
</head>
<body>
  <aside class="sidebar">
    <header class="brand">
      <span class="logo">☕</span>
      <h1>MOCHA</h1>
    </header>
    <button id="new-session" class="new-btn">+ 새 분석</button>
    <div id="bulk-bar" class="bulk-bar"></div>
    <nav class="session-list" id="session-list"></nav>
    <div class="sidebar-foot">
      <small>v0.1 MVP · 자연어로 묻는 Watcha 데이터 분석 AI</small>
    </div>
  </aside>

  <main class="chat">
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-logo">☕</div>
        <h2>MOCHA</h2>
        <p>자연어로 Watcha 데이터에 대해 물어보세요.</p>
        <div class="examples">
          <button class="example">graph_modeling 데이터 EDA 리포트 만들어줘</button>
          <button class="example">큰손 유저는 누구야?</button>
          <button class="example">장르 분석해줘</button>
          <button class="example">노션에 올려줘</button>
        </div>
      </div>
    </div>

    <form id="chat-form" class="composer-wrap">
      <div class="composer">
        <textarea
          id="prompt"
          placeholder="데이터에 대해 자연어로 물어보세요. (Enter 전송, Shift+Enter 줄바꿈)"
          rows="1"
          autofocus
        ></textarea>
        <button type="submit" id="send-btn" aria-label="전송">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M3 11l18-8-8 18-2-8z"/>
          </svg>
        </button>
      </div>
      <p class="composer-hint">MOCHA는 실수할 수 있어요. 중요한 분석은 출처를 확인해주세요.</p>
    </form>
    <footer class="page-footer">
      <p class="adp-service-desc">자연어로 묻는 Watcha 데이터 분석 AI — mocha.watcha.io</p>
    </footer>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
